<!DOCTYPE html>
<html>
<head>
    <title>CSS Example</title>

    <style>
        p {
            text-align: center;
            color: red;
            font-size: 40px;
            background-color: yellow;
        }

        #para-margin {
            margin: 100px;
            color: blue;
            width: 200px;
        }

        .p-padding {
            padding: 20px;
        }
    </style>
</head>

<body>

    <p id="para-margin" class="p-padding" style="border:10px solid green;">
        CSS Class
    </p>

    <p>First Class</p>

</body>
</html>
